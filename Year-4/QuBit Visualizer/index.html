<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bloch Sphere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="stars"></div>

<div class="layout">

  <header>
    <div class="logo">BLOCH<span>SPHERE</span></div>
    <div class="header-right">
      <span class="live-dot"></span>
      <span class="logo-sub">© AS</span>
    </div>
  </header>

  <div class="panel-left">

    <div class="panel-section">
      <div class="section-label">States</div>
      <div class="state-grid">
        <button class="state-btn" data-state="|0⟩">|0⟩</button>
        <button class="state-btn" data-state="|1⟩">|1⟩</button>
        <button class="state-btn" data-state="|+⟩">|+⟩</button>
        <button class="state-btn" data-state="|-⟩">|-⟩</button>
        <button class="state-btn" data-state="|i⟩">|i⟩</button>
        <button class="state-btn" data-state="|-i⟩">|-i⟩</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-label">Angles</div>
      <div class="slider-row">
        <div class="slider-label">
          <span class="slider-name">θ</span>
          <span class="slider-val" id="val-theta">90°</span>
        </div>
        <input type="range" id="sl-theta" min="0" max="180" value="90" step="1">
      </div>
      <div class="slider-row">
        <div class="slider-label">
          <span class="slider-name">φ</span>
          <span class="slider-val" id="val-phi">0°</span>
        </div>
        <input type="range" id="sl-phi" min="0" max="360" value="0" step="1">
      </div>
    </div>

    <div class="panel-section">
      <div class="section-label">Gates</div>
      <div class="gate-grid">
        <button class="gate-btn" data-gate="X">X</button>
        <button class="gate-btn" data-gate="Y">Y</button>
        <button class="gate-btn" data-gate="Z">Z</button>
        <button class="gate-btn" data-gate="H">H</button>
        <button class="gate-btn" data-gate="S">S</button>
        <button class="gate-btn" data-gate="T">T</button>
        <button class="gate-btn" data-gate="Rx">Rx</button>
        <button class="gate-btn" data-gate="Ry">Ry</button>
        <button class="gate-btn" data-gate="Rz">Rz</button>
      </div>
    </div>

    <div class="panel-section">
      <button class="measure-btn" id="btn-measure">MEASURE</button>
    </div>

    <div class="panel-section toggles">
      <div class="toggle-row">
        <span>Rotate</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-rotate" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <span>Trails</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-trails" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <span>Grid</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-grid" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

  </div>

  <div class="canvas-area">
    <canvas id="sphere"></canvas>
    <div id="measure-result">0</div>
  </div>

  <div class="panel-right">

    <div class="panel-section">
      <div class="section-label">Amplitudes</div>
      <div class="stat-row"><span class="stat-label">α</span><span class="stat-value" id="stat-alpha">1.0000</span></div>
      <div class="stat-row"><span class="stat-label">β</span><span class="stat-value" id="stat-beta">0.0000</span></div>
      <div class="stat-row"><span class="stat-label">φ</span><span class="stat-value" id="stat-phase">0.00°</span></div>
    </div>

    <div class="panel-section">
      <div class="section-label">Probability</div>
      <div class="prob-bar-wrap">
        <div class="prob-bar-label"><span>|0⟩</span><span id="pct-zero">100%</span></div>
        <div class="prob-bar-bg"><div class="prob-bar-fill zero" id="bar-zero" style="width:100%"></div></div>
        <div class="prob-bar-label"><span>|1⟩</span><span id="pct-one">0%</span></div>
        <div class="prob-bar-bg"><div class="prob-bar-fill one" id="bar-one" style="width:0%"></div></div>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-label">Bloch Vector</div>
      <div class="bloch-coords">
        <div class="coord-row">
          <span class="coord-axis x">X</span>
          <div class="coord-bar-bg"><div class="coord-bar-fill" id="bar-bx"></div></div>
          <span class="coord-val" id="val-bx">0.000</span>
        </div>
        <div class="coord-row">
          <span class="coord-axis y">Y</span>
          <div class="coord-bar-bg"><div class="coord-bar-fill" id="bar-by"></div></div>
          <span class="coord-val" id="val-by">0.000</span>
        </div>
        <div class="coord-row">
          <span class="coord-axis z">Z</span>
          <div class="coord-bar-bg"><div class="coord-bar-fill" id="bar-bz"></div></div>
          <span class="coord-val" id="val-bz">1.000</span>
        </div>
      </div>
    </div>

  </div>

</div>

<script src="main.js"></script>
</body>
</html>
